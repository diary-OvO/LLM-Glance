<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Glance</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1 id="title">LLM Glance</h1>
          <p id="statusText">Checking this tab...</p>
        </div>
        <div class="header-actions">
          <button id="languageToggle" class="ghost" type="button">中文</button>
          <span id="statusDot" class="status-dot" aria-hidden="true"></span>
        </div>
      </header>

      <section id="settingsPanel" class="panel" aria-label="Glance settings">
        <label class="switch-row">
          <span>
            <strong data-i18n="enableTitle">Enable on page</strong>
            <small data-i18n="enableHelp">Show the ChatGPT Glance panel.</small>
          </span>
          <input id="enabled" type="checkbox" role="switch">
        </label>

        <label class="field">
          <span data-i18n="themeLabel">Color scheme</span>
          <select id="theme">
            <option value="auto" data-i18n="themeAuto">Auto</option>
            <option value="light" data-i18n="themeLight">Light</option>
            <option value="dark" data-i18n="themeDark">Dark</option>
            <option value="highContrast" data-i18n="themeHighContrast">High contrast</option>
            <option value="soft" data-i18n="themeSoft">Soft</option>
          </select>
        </label>

        <label class="field">
          <span data-i18n="densityLabel">Density</span>
          <select id="density">
            <option value="compact" data-i18n="densityCompact">Compact</option>
            <option value="comfortable" data-i18n="densityComfortable">Comfortable</option>
            <option value="roomy" data-i18n="densityRoomy">Roomy</option>
          </select>
        </label>

        <label class="switch-row quiet">
          <span>
            <strong data-i18n="lensTitle">Lens preview</strong>
            <small data-i18n="lensHelp">Show a local message excerpt on hover.</small>
          </span>
          <input id="lensEnabled" type="checkbox" role="switch">
        </label>

        <label class="switch-row quiet">
          <span>
            <strong data-i18n="borderTitle">Viewport border</strong>
            <small data-i18n="borderHelp">Draw the current-view outline.</small>
          </span>
          <input id="viewportBorder" type="checkbox" role="switch">
        </label>

        <label class="switch-row quiet">
          <span>
            <strong data-i18n="debugTitle">Debug logs</strong>
            <small data-i18n="debugHelp">Print detailed startup diagnostics in DevTools.</small>
          </span>
          <input id="debug" type="checkbox" role="switch">
        </label>
      </section>

      <footer class="actions">
        <button id="refresh" type="button" data-i18n="refresh">Refresh map</button>
        <button id="copyDebug" type="button" data-i18n="copyDebug">Copy debug</button>
        <button id="togglePage" class="primary" type="button" data-i18n="toggleRail">Toggle rail</button>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
